# _config.yml

# Site info
title: Gatecraft Coords
description: A fan-made coords database for Gatecraft server
baseurl: "" 
url: "https://vlkodlak148.github.io/Gatecraft-Coords"

# Theme
theme: jekyll-theme-slate

# Author
author:
  name: Vlkodlak148
  email: Vlkodlak148@proton.me

# Markdown / formatting
markdown: kramdown
highlighter: rouge

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Exclude unnecessary files/folders from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# Collections (optional, not strictly needed for normal folders)
collections:
  worlds:
    output: true

# Keep future-dated posts/pages visible
future: true

# Permalinks / clean URLs for root pages
defaults:
  - scope:
      path: ""       # applies to all files
      type: "pages"
    values:
      permalink: /:path/

# Notes:
# - Subfolders like chaosphere/, mining-colony/ etc. will generate .html pages
# - Use links to the .html files in your README, e.g.:
#   - [Marshes of Oblivion](marshes-of-oblivion.html)
#   - [Pale Cave](pale-cave.html)
#   - [Chaos Maze](chaos-maze.html)
# - Theme will now be applied to all generated pages automatically
