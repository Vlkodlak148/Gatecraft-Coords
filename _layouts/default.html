<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <!-- Jekyll SEO / Feed tags -->
  {% seo %}
  {% feed_meta %}
  <style>
    /* Quick search styling to match Slate theme */
    #search-input {
      padding: 6px 10px;
      font-size: 0.9rem;
      border-radius: 4px;
      border: 1px solid #ccc;
      margin-left: 1rem;
    }
    #results {
      list-style: none;
      padding-left: 0;
      margin-top: 0.5rem;
    }
    #results li a {
      color: #0a0a0a;
      text-decoration: none;
    }
    #results li a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <header>
    <h1><a href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
    <input type="text" id="search-input" placeholder="Search pages..." />
    <ul id="results"></ul>
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    <p>Gatecraft Coords maintained by {{ site.author.name }}</p>
    <p>Published with GitHub Pages — Theme: Slate</p>
  </footer>

  <!-- Simple-Jekyll-Search -->
  <script src="https://unpkg.com/simple-jekyll-search@latest/dst/simple-jekyll-search.min.js"></script>
  <script>
    SimpleJekyllSearch({
      searchInput: document.getElementById('search-input'),
      resultsContainer: document.getElementById('results'),
      json: '/search.json', // create this JSON with page titles + URLs
      searchResultTemplate: '<li><a href="{url}">{title}</a></li>',
      noResultsText: 'No results found',
      limit: 10,
      fuzzy: false
    });
  </script>
</body>
</html>
