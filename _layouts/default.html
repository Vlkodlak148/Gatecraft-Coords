<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>
  <header>
    <h1><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
    <input type="text" id="search-input" placeholder="Search...">
  </header>

  <main>
    {{ content }}
  </main>

  <footer>
    Gatecraft Coords maintained by {{ site.author.name }}
  </footer>

  <script>
    // Simple search script
    const searchInput = document.getElementById('search-input');
    searchInput.addEventListener('input', async function() {
      const query = this.value.toLowerCase();
      const res = await fetch('{{ site.baseurl }}/search.json');
      const data = await res.json();
      const results = data.filter(item => item.title.toLowerCase().includes(query));
      console.log(results); // You can later render these as a list
    });
  </script>
</body>
</html>
